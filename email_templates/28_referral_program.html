<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refer a Friend!</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #eef2ff;
            margin: 0;
            padding: 0;
            color: #0f172a;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 16px;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            color: #0f172a;
            text-decoration: none;
        }

        .logo-icon {
            color: #8c74fb;
        }

        .content {
            padding: 30px 40px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            margin-top: 0;
            margin-bottom: 8px;
            color: #4338ca;
        }

        .referral-box {
            background: #e0e7ff;
            padding: 24px;
            border-radius: 12px;
            margin: 32px 0;
            border: 2px dashed #6366f1;
        }

        .btn {
            display: inline-block;
            background-color: #4338ca;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <table width="100%" border="0" cellspacing="0" cellpadding="0" bgcolor="#eef2ff">
        <tr>
            <td align="center" style="padding: 20px;">
                <div class="container">
                    <div class="header"><a href="https://Bloomina.in" class="logo"><img src="https://hszccnxojpwfqjqzymlx.supabase.co/storage/v1/object/public/portfolio/1771920901826_Bloomina_transparent_blue.png" alt="Bloomina Logo" style="height: 48px; width: auto; max-width: 100%; display: block; margin: 0 auto;"></a></div>
                    <div class="illustration-container" style="text-align: center; padding: 20px 40px 0;"><img src="https://hszccnxojpwfqjqzymlx.supabase.co/storage/v1/object/public/portfolio/1771927602636_discount-voucher-box-promo-coupons-with-stars-and-coins-special-offer.png" style="max-width: 200px; height: auto;"></div>
                    <div class="content">
                        <h1>Give 15%, Get ₹500 🤝</h1>
                        <p>Love our gear? Share it with a friend! Give your friends 15% off their first order, and get
                            ₹500 in store credit when they make a purchase.</p>
                        <div class="referral-box">
                            <h3 style="margin-top:0;">Your Personal Link</h3>
                            <p
                                style="font-family: monospace; font-size: 16px; background: white; padding: 12px; border-radius: 8px; margin-bottom: 24px;">
                                {{referral_link}}</p>
                            <a href="{{referral_link}}" class="btn">Share Your Link</a>
                        </div>
                    </div>
                </div>
            </td>
        </tr>
    </table>
</body>

</html>
