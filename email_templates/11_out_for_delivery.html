<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Out for Delivery</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            color: #0f172a;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }

        .header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            color: #0f172a;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logo-icon {
            color: #8c74fb;
        }

        .content {
            padding: 30px 40px;
            text-align: left;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 8px;
            color: #0f172a;
            text-align: center;
        }

        .driver-box {
            background: #fdfae8;
            border: 1px solid #fef08a;
            border-left: 4px solid #eab308;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
            text-align: center;
        }

        .status-text {
            font-size: 18px;
            font-weight: bold;
            color: #854d0e;
            margin-bottom: 8px;
            display: block;
        }

        .btn {
            display: inline-block;
            text-align: center;
            background-color: #eab308;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <table width="100%" border="0" cellspacing="0" cellpadding="0" bgcolor="#f8fafc">
        <tr>
            <td align="center" style="padding: 20px;">
                <div class="container">
                    <div class="header"><a href="https://Bloomina.in" class="logo"><img src="https://hszccnxojpwfqjqzymlx.supabase.co/storage/v1/object/public/portfolio/1771920901826_Bloomina_transparent_blue.png" alt="Bloomina Logo" style="height: 48px; width: auto; max-width: 100%; display: block; margin: 0 auto;"></a></div>
                    <div class="illustration-container" style="text-align: center; padding: 20px 40px 0;"><img src="https://hszccnxojpwfqjqzymlx.supabase.co/storage/v1/object/public/portfolio/1771927807480_3d-business-drone-with-a-parcel.png" style="max-width: 200px; height: auto;"></div>
                    <div class="content">
                        <h1>Your order is out for delivery! 🛵</h1>

                        <div class="driver-box">
                            <span class="status-text">Arriving today by {{estimated_time}}</span>
                            <p style="margin:0; font-size:14px; color:#c2410c;">Your package from order #{{order_id}}
                                has been loaded onto the delivery vehicle.</p>
                        </div>
                        <div style="text-align: center;">
                            <a href="{{tracking_url}}" class="btn">Live Track Delivery</a>
                        </div>
                    </div>
                </div>
            </td>
        </tr>
    </table>
</body>

</html>
