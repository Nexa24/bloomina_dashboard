<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We're Sorry</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            color: #0f172a;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 16px;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            color: #0f172a;
            text-decoration: none;
        }

        .logo-icon {
            color: #8c74fb;
        }

        .content {
            padding: 30px 40px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 8px;
            color: #0f172a;
        }

        .btn {
            display: inline-block;
            background-color: #0f172a;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <table width="100%" border="0" cellspacing="0" cellpadding="0" bgcolor="#f8fafc">
        <tr>
            <td align="center" style="padding: 20px;">
                <div class="container">
                    <div class="header"><a href="https://Bloomina.in" class="logo"><img src="https://hszccnxojpwfqjqzymlx.supabase.co/storage/v1/object/public/portfolio/1771920901826_Bloomina_transparent_blue.png" alt="Bloomina Logo" style="height: 48px; width: auto; max-width: 100%; display: block; margin: 0 auto;"></a></div>
                    <div class="illustration-container" style="text-align: center; padding: 20px 40px 0;"><img src="https://hszccnxojpwfqjqzymlx.supabase.co/storage/v1/object/public/portfolio/1771927602636_discount-voucher-box-promo-coupons-with-stars-and-coins-special-offer.png" style="max-width: 200px; height: auto;"></div>
                    <div class="content">
                        <h1>We owe you an apology. 🙇‍♂️</h1>
                        <p>Hi {{first_name}}, an error occurred recently with our systems that affected your experience.
                            We are profoundly sorry and have fixed the underlying issue.</p>
                        <p>To make it right, please accept this 15% discount code on your next purchase:</p>
                        <h2 style="background: #f1f5f9; padding: 20px; font-family: monospace;">
                            {{apology_discount_code}}</h2>
                        <a href="{{shop_url}}" class="btn">Shop Now</a>
                    </div>
                </div>
            </td>
        </tr>
    </table>
</body>

</html>
