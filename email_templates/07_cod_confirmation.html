<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action Required: Cash on Delivery Verification</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            color: #0f172a;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }

        .header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            color: #0f172a;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logo-icon {
            color: #8c74fb;
        }

        .content {
            padding: 30px 40px;
            text-align: left;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 8px;
            color: #0f172a;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #475569;
            font-size: 15px;
            margin-bottom: 32px;
        }

        .alert-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-left: 4px solid #22c55e;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
            text-align: center;
        }

        .btn-green {
            display: inline-block;
            background-color: #22c55e;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            margin: 16px 8px 0;
        }

        .btn-gray {
            display: inline-block;
            background-color: #f1f5f9;
            color: #475569;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            margin: 16px 8px 0;
        }

        .footer {
            background-color: #f1f5f9;
            padding: 30px 40px;
            text-align: center;
            font-size: 13px;
            color: #64748b;
        }

        @media only screen and (max-width: 600px) {
            .container {
                margin: 20px;
                border-radius: 12px;
            }

            .content,
            .footer {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <table width="100%" border="0" cellspacing="0" cellpadding="0" bgcolor="#f8fafc">
        <tr>
            <td align="center" style="padding: 20px;">
                <div class="container">
                    <div class="header"><a href="https://Bloomina.in" class="logo"><img src="https://hszccnxojpwfqjqzymlx.supabase.co/storage/v1/object/public/portfolio/1771920901826_Bloomina_transparent_blue.png" alt="Bloomina Logo" style="height: 48px; width: auto; max-width: 100%; display: block; margin: 0 auto;"></a></div>
                    <div class="illustration-container" style="text-align: center; padding: 20px 40px 0;"><img src="https://hszccnxojpwfqjqzymlx.supabase.co/storage/v1/object/public/portfolio/1771927153700_credit-card-with-user-icon-personal-account-payment-access-1.png" style="max-width: 200px; height: auto;"></div>
                    <div class="content">
                        <h1>Verify Your COD Order 📦</h1>
                        <p class="subtitle">Hi {{first_name}}, we received your Cash on Delivery (COD) order request for
                            Order #{{order_id}}.</p>

                        <div class="alert-box">
                            <h3 style="margin-top:0; color:#166534;">Final Confirmation Required</h3>
                            <p style="margin-bottom:0; color:#15803d; font-size:14px;">To protect against spam, please
                                confirm your intent to purchase. We only ship confirmed orders.</p>
                            <a href="{{confirm_cod_url}}" class="btn-green">Confirm Order</a>
                            <a href="{{cancel_cod_url}}" class="btn-gray">Cancel Order</a>
                        </div>
                    </div>
                    <div class="footer">
                        <p>Bloomina Inc.</p>
                    </div>
                </div>
            </td>
        </tr>
    </table>
</body>

</html>
