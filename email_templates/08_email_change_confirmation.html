<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Change Confirmation</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            color: #0f172a;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }

        .header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            color: #0f172a;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logo-icon {
            color: #8c74fb;
        }

        .content {
            padding: 30px 40px;
            text-align: left;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 16px;
            color: #0f172a;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
            color: #475569;
        }

        .btn {
            display: inline-block;
            background-color: #8c74fb;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
        }

        .warning {
            background-color: #fef2f2;
            border-left: 4px solid #ef4444;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            color: #b91c1c;
            margin-bottom: 24px;
        }

        .footer {
            background-color: #f1f5f9;
            padding: 30px 40px;
            text-align: center;
            font-size: 13px;
            color: #64748b;
        }

        @media only screen and (max-width: 600px) {
            .container {
                margin: 20px;
                border-radius: 12px;
            }

            .content,
            .footer {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <table width="100%" border="0" cellspacing="0" cellpadding="0" bgcolor="#f8fafc">
        <tr>
            <td align="center" style="padding: 20px;">
                <div class="container">
                    <div class="header"><a href="https://Bloomina.in" class="logo"><img src="https://hszccnxojpwfqjqzymlx.supabase.co/storage/v1/object/public/portfolio/1771920901826_Bloomina_transparent_blue.png" alt="Bloomina Logo" style="height: 48px; width: auto; max-width: 100%; display: block; margin: 0 auto;"></a></div>
                    <div class="illustration-container" style="text-align: center; padding: 20px 40px 0;"><img src="https://hszccnxojpwfqjqzymlx.supabase.co/storage/v1/object/public/portfolio/1771922642661_mega-creator%20(3).png" style="max-width: 200px; height: auto;"></div>
                    <div class="content">
                        <h1>Confirm Your New Email</h1>
                        <p>We received a request to update the email address connected to your Bloomina account. To
                            complete the update, please verify your new email address.</p>
                        <div style="text-align: center; margin: 32px 0;">
                            <a href="{{verification_url}}" class="btn">Verify New Email</a>
                        </div>
                        <div class="warning">
                            <strong>Did you not request this?</strong> If you did not attempt to change your email,
                            please instantly reset your password.
                        </div>
                    </div>
                </div>
            </td>
        </tr>
    </table>
</body>

</html>
