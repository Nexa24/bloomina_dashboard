<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Your Password</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #8c74fb;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            color: #111827;
        }

        .wrapper {
            padding: 40px 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #111827;
            text-decoration: none;
            display: inline-block;
        }

        .logo-icon {
            color: #8c74fb;
        }

        .illustration-container {
            text-align: center;
            padding: 0 40px;
            margin-bottom: 24px;
        }

        .illustration-bg {
            background-color: #f3f4f6;
            border-radius: 16px;
            padding: 30px;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }

        .illustration-img {
            font-size: 64px;
            line-height: 1;
            margin: 0;
            color: #d1d5db;
        }

        .content {
            padding: 0 40px 40px;
            text-align: center;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 12px;
            color: #111827;
        }

        p {
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 24px;
            color: #4b5563;
        }

        .btn {
            display: inline-block;
            background-color: #8c74fb;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 15px;
        }

        .footer {
            background-color: #f9fafb;
            padding: 30px 40px;
            text-align: left;
            font-size: 13px;
            color: #6b7280;
        }

        .footer a {
            color: #8c74fb;
            text-decoration: none;
        }

        @media only screen and (max-width: 600px) {
            .wrapper {
                padding: 20px 10px;
            }

            .container {
                border-radius: 16px;
            }

            .illustration-container,
            .content,
            .footer {
                padding-left: 24px;
                padding-right: 24px;
            }
        }
    </style>
</head>

<body>
    <table width="100%" border="0" cellspacing="0" cellpadding="0" bgcolor="#8c74fb">
        <tr>
            <td align="center" class="wrapper">
                <div class="container">
                    <div class="header">
                        <a href="https://Bloomina.in" class="logo"><img src="https://hszccnxojpwfqjqzymlx.supabase.co/storage/v1/object/public/portfolio/1771920901826_Bloomina_transparent_blue.png" alt="Bloomina Logo" style="height: 48px; width: auto; max-width: 100%; display: block; margin: 0 auto;"></a>
                    </div>

                    <div class="illustration-container" style="text-align: center; padding: 20px 40px 0;"><img src="https://hszccnxojpwfqjqzymlx.supabase.co/storage/v1/object/public/portfolio/1771922642661_mega-creator%20(3).png" style="max-width: 200px; height: auto;"></div>

                    <div class="content">
                        <h1>Hi {{first_name}},</h1>
                        <p>Need to reset your password? No problem.<br>Just click the button below.</p>

                        <a href="{{reset_url}}" class="btn">Reset password &nearr;</a>
                    </div>

                    <div class="footer">
                        <p style="margin-top: 0; margin-bottom: 24px;">If you did not initiate this request, please
                            contact us at <a href="mailto:support@Bloomina.in">support@Bloomina.in</a>.</p>

                        <table width="100%" border="0" cellspacing="0" cellpadding="0">
                            <tr>
                                <td align="left" valign="bottom"
                                    style="font-size: 13px; color: #6b7280; line-height: 1.5;">
                                    Thanks,<br>The Bloomina Team
                                </td>
                                <td align="right" valign="bottom" style="font-size: 12px; color: #9ca3af;">
                                    <a href="#" style="margin-right:8px; color:#9ca3af; text-decoration:none;">FB</a>
                                    <a href="#" style="margin-right:8px; color:#9ca3af; text-decoration:none;">IG</a>
                                    <a href="#" style="color:#9ca3af; text-decoration:none;">IN</a>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2" style="font-size: 11px; color: #d1d5db; padding-top: 16px;">
                                    &copy; 2024 Bloomina
                                </td>
                            </tr>
                        </table>
                    </div>
                </div>
            </td>
        </tr>
    </table>
</body>

</html>
