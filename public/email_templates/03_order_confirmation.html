<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation</title>
</head>
<body style="background-color: #f9f9f9; padding: 40px 20px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 12px; border: 1px solid #e0e0e0; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden;">
        <div style="padding: 40px 40px 20px; text-align: center;">
            <h1 style="color: #8c74fb; font-size: 28px; font-weight: 700; margin: 0;">Order Confirmed!</h1>
        </div>
        
        <div style="padding: 0 40px 40px;">
            <p style="font-size: 15px; color: #666; line-height: 1.5; margin-bottom: 5px;">Hi {{first_name}},</p>
            <p style="font-size: 15px; color: #666; line-height: 1.5; margin-bottom: 30px;">
                Thank you for shopping with Bloomina. We've received your order <strong>#{{order_id}}</strong> and are processing it.
            </p>
            
            <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                <thead>
                    <tr style="background-color: #fcfcfc;">
                        <th style="padding: 12px 0; text-align: left; border-bottom: 2px solid #f2f2f2; font-size: 13px; color: #999; text-transform: uppercase; letter-spacing: 1px;">Item</th>
                        <th style="padding: 12px 0; text-align: center; border-bottom: 2px solid #f2f2f2; font-size: 13px; color: #999; text-transform: uppercase; letter-spacing: 1px;">Qty</th>
                        <th style="padding: 12px 0; text-align: right; border-bottom: 2px solid #f2f2f2; font-size: 13px; color: #999; text-transform: uppercase; letter-spacing: 1px;">Price</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Loop items here -->
                </tbody>
            </table>
            
            <div style="text-align: right; margin-bottom: 40px;">
                <span style="font-size: 18px; color: #333; font-weight: 700;">Total: {{total_amount}}</span>
            </div>
            
            <div style="text-align: center;">
                <a href="{{order_status_url}}" 
                   style="background-color: #8c74fb; color: #ffffff; padding: 16px 35px; text-decoration: none; border-radius: 8px; font-weight: 700; font-size: 16px; display: inline-block;">
                   Track Your Order
                </a>
            </div>
        </div>
        
        <div style="background-color: #ffffff; border-top: 1px solid #f2f2f2; padding: 25px 40px; text-align: center;">
            <p style="font-size: 12px; color: #999; margin: 0;">We'll send you another email when your order has been shipped.</p>
        </div>
    </div>
</body>
</html>
